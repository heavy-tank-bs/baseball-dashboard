<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NPB dashboard | 年度別打者成績</title>
  <link rel="stylesheet" href="./styles.css?v=20260501-6">
</head>
<body>
  <div class="site-shell">
    <header class="hero summary-hero">
      <div class="hero-bar">
        <div class="hero-copy">
          <p class="hero-kicker">NPB dashboard</p>
          <h1>年度別打者成績</h1>
          <p class="hero-subtitle">シーズン単位の打者成績を絞り込んで比較します。</p>
        </div>
        <nav class="hero-nav" aria-label="ページ移動">
          <a class="hero-nav-link" href="./index.html">試合別成績</a>
          <a class="hero-nav-link active" href="./annual.html">年度別成績</a>
          <a class="hero-nav-link" href="./ranking-pitcher.html">ランキング</a>
          <a class="hero-nav-link" href="./player.html">個人成績</a>
        </nav>
      </div>
    </header>

    <section class="type-switch-section" aria-label="投手・打者切替">
      <div class="type-switch">
        <a class="type-switch-link" href="./annual.html">投手</a>
        <a class="type-switch-link active" href="./annual-batter.html">打者</a>
      </div>
    </section>

    <main class="panel annual-main">
      <section class="panel-block">
        <div class="section-head">
          <h2>年度別打者成績</h2>
          <span id="annualResultCount" class="result-count">0件</span>
        </div>
        <div class="filters-grid">
          <label class="filter-field">
            <span>年度</span>
            <select id="yearSelect" class="field-select"></select>
          </label>
          <label class="filter-field">
            <span>リーグ</span>
            <select id="leagueSelect" class="field-select"></select>
          </label>
          <label class="filter-field">
            <span>球団</span>
            <select id="teamSelect" class="field-select"></select>
          </label>
          <label class="filter-field">
            <span>選手</span>
            <select id="playerSelect" class="field-select"></select>
          </label>
          <label class="filter-field innings-filter">
            <div class="filter-inline">
              <span>打席数下限</span>
              <div class="innings-inline">
                <input id="plateAppearancesInput" class="innings-input" type="number" inputmode="numeric" min="0" step="1" value="0" aria-label="打席数下限入力">
              </div>
            </div>
            <input id="plateAppearancesRange" class="range-input" type="range" min="0" max="0" step="1" value="0">
            <div class="range-scale">
              <span>0</span>
              <span id="plateAppearancesMaxLabel">0</span>
            </div>
          </label>
        </div>
      </section>

      <section class="panel-block">
        <p id="annualNote" class="annual-note"></p>
        <div id="annualTableWrap"></div>
      </section>
    </main>
  </div>

  <script src="./annual-batter.js?v=20260501-5"></script>
</body>
</html>
