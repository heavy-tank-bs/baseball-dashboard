<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NPB dashboard | 個人成績</title>
  <link rel="stylesheet" href="./styles.css?v=20260502-3">
</head>
<body>
  <div class="site-shell">
    <header class="hero summary-hero">
      <div class="hero-bar">
        <div class="hero-copy">
          <p class="hero-kicker">NPB dashboard</p>
          <h1>個人成績</h1>
          <p class="hero-subtitle">選手ごとの年度成績ビューを表示します。</p>
        </div>
        <nav class="hero-nav" aria-label="ページ移動">
          <a class="hero-nav-link" href="./index.html">試合別成績</a>
          <a class="hero-nav-link" href="./annual.html">年度別成績</a>
          <a class="hero-nav-link" href="./ranking-pitcher.html">ランキング</a>
          <a class="hero-nav-link active" href="./player.html">個人成績</a>
        </nav>
      </div>
    </header>

    <section class="type-switch-section" aria-label="投手・打者切替">
      <div id="playerTypeSwitch" class="type-switch">
        <button class="type-switch-link active" type="button" data-player-type="pitcher">投手</button>
        <button class="type-switch-link" type="button" data-player-type="batter">打者</button>
      </div>
    </section>

    <main class="panel annual-main">
      <section class="panel-block">
        <div class="section-head">
          <h2>個人成績</h2>
          <span id="playerResultCount" class="result-count">0件</span>
        </div>
        <div class="filters-grid player-filters-grid">
          <label class="filter-field">
            <span>年度</span>
            <select id="yearSelect" class="field-select"></select>
          </label>
          <label class="filter-field">
            <span>リーグ</span>
            <select id="leagueSelect" class="field-select"></select>
          </label>
          <label class="filter-field">
            <span>球団</span>
            <select id="teamSelect" class="field-select"></select>
          </label>
          <label class="filter-field player-select-field">
            <span>選手</span>
            <select id="playerSelect" class="field-select"></select>
          </label>
        </div>
      </section>

      <section class="panel-block player-action-panel">
        <div class="player-output-card">
          <div class="player-output-head">
            <div>
              <p id="playerSelectionLabel" class="annual-note">選手を選択してください。</p>
              <h3 id="playerSelectionTitle">-</h3>
            </div>
          </div>
          <div id="playerStatsEmpty" class="section-empty player-stats-empty">選手を選択してください。</div>
          <iframe id="playerStatsFrame" class="player-stats-frame is-hidden" title="個人成績"></iframe>
        </div>
      </section>
    </main>
  </div>

  <script src="./player.js?v=20260501-5"></script>
</body>
</html>
