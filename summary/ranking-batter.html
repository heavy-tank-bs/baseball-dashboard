<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NPB dashboard | 打者ランキング</title>
  <link rel="stylesheet" href="./styles.css?v=20260501-6">
</head>
<body data-ranking-type="batter">
  <div class="site-shell">
    <header class="hero summary-hero">
      <div class="hero-bar">
        <div class="hero-copy">
          <p class="hero-kicker">NPB dashboard</p>
          <h1>打者ランキング</h1>
          <p class="hero-subtitle">年度・リーグ・球団を絞り込んで打者指標をランキング表示します</p>
        </div>
        <nav class="hero-nav" aria-label="ページ移動">
          <a class="hero-nav-link" href="./index.html">試合別成績</a>
          <a class="hero-nav-link" href="./annual.html">年度別成績</a>
          <a class="hero-nav-link active" href="./ranking-pitcher.html">ランキング</a>
          <a class="hero-nav-link" href="./player.html">個人成績</a>
        </nav>
      </div>
    </header>

    <section class="type-switch-section" aria-label="投手・打者切替">
      <div class="type-switch">
        <a class="type-switch-link" href="./ranking-pitcher.html">投手</a>
        <a class="type-switch-link active" href="./ranking-batter.html">打者</a>
      </div>
    </section>

    <main class="panel annual-main">
      <section class="panel-block">
        <div class="section-head">
          <h2>打者ランキング</h2>
          <span id="rankingResultCount" class="result-count">0件</span>
        </div>
        <div class="filters-grid ranking-filters-grid">
          <label class="filter-field">
            <span>年度</span>
            <select id="yearSelect" class="field-select"></select>
          </label>
          <label class="filter-field">
            <span>リーグ</span>
            <select id="leagueSelect" class="field-select"></select>
          </label>
          <label class="filter-field">
            <span>球団</span>
            <select id="teamSelect" class="field-select"></select>
          </label>
          <label class="filter-field">
            <span>ランキング指標</span>
            <select id="metricSelect" class="field-select"></select>
          </label>
          <label class="filter-field">
            <span>表示人数</span>
            <select id="limitSelect" class="field-select">
              <option value="5">5人表示</option>
              <option value="10" selected>10人表示</option>
              <option value="20">20人表示</option>
            </select>
          </label>
          <label id="thresholdField" class="filter-field innings-filter ranking-threshold-field">
            <div class="filter-inline">
              <span id="thresholdLabel">打席数条件</span>
              <div class="innings-inline ranking-threshold-controls">
                <select id="thresholdMode" class="field-select threshold-mode-select"></select>
                <input id="thresholdInput" class="innings-input ranking-threshold-input" type="number" inputmode="numeric" min="0" step="1" value="0" aria-label="打席数下限入力">
              </div>
            </div>
            <input id="thresholdRange" class="range-input" type="range" min="0" max="0" step="1" value="0">
            <div class="range-scale">
              <span>0</span>
              <span id="thresholdMaxLabel">0</span>
            </div>
          </label>
        </div>
      </section>

      <section class="panel-block">
        <p id="rankingNote" class="annual-note"></p>
        <div id="rankingBody"></div>
      </section>
    </main>
  </div>

  <script src="./ranking.js?v=20260501-2"></script>
</body>
</html>
