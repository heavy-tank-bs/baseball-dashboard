<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>前年比較ダッシュボード</title>
  <link rel="stylesheet" href="./styles.css?v=20260421-04">
</head>
<body>
  <div class="site-shell">
    <header class="hero">
      <div class="hero-bar">
        <div class="hero-copy">
          <p id="compareEyebrow" class="hero-kicker">Year Over Year</p>
          <h1 id="compareTitle">前年比較ダッシュボード</h1>
          <p id="compareSubtitle" class="compare-subtitle"></p>
        </div>
        <nav class="hero-nav" aria-label="ページ移動">
          <a class="hero-nav-link" href="./index.html">試合別投手成績</a>
          <a class="hero-nav-link" href="./batter.html">試合別打者成績</a>
          <a class="hero-nav-link" href="./annual.html">年度別投手成績</a>
          <a class="hero-nav-link" href="./annual-batter.html">年度別打者成績</a>
        </nav>
      </div>
    </header>

    <main class="panel annual-main">
      <section class="panel-block">
        <div class="section-head compare-head">
          <div>
            <h2 id="comparePlayerName">選手を読み込み中</h2>
            <p id="compareDescription" class="compare-subtitle compare-subtitle--muted"></p>
          </div>
          <a id="compareBackLink" class="action-link secondary compare-back-link" href="./annual.html">年度別成績へ戻る</a>
        </div>
        <div id="compareSeasonGrid" class="season-meta-grid"></div>
      </section>

      <section class="panel-block">
        <div class="section-head compare-head">
          <h2>比較指標</h2>
          <span id="compareMetricCount" class="result-count">0項目</span>
        </div>
        <div id="metricToggleGroup" class="compare-toggle-group"></div>
        <div id="compareCardGrid" class="comparison-card-grid"></div>
      </section>
    </main>
  </div>

  <script src="./compare.js?v=20260421-04"></script>
</body>
</html>
