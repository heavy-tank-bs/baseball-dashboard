<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>選手成績ビュー</title>
  <link rel="stylesheet" href="./styles.css?v=20260501-7">
</head>
<body>
  <div class="site-shell">
    <header class="hero">
      <div class="hero-bar">
        <div class="hero-copy">
          <p id="compareEyebrow" class="hero-kicker">Player View</p>
          <h1 id="compareTitle">選手成績ビュー</h1>
          <p id="compareSubtitle" class="compare-subtitle"></p>
        </div>
        <nav class="hero-nav" aria-label="ページ移動">
          <a class="hero-nav-link" href="./index.html">試合別成績</a>
          <a class="hero-nav-link" href="./annual.html">年度別成績</a>
          <a class="hero-nav-link" href="./ranking-pitcher.html">ランキング</a>
          <a class="hero-nav-link active" href="./player.html">個人成績</a>
        </nav>
      </div>
    </header>

    <section class="type-switch-section" aria-label="投手・打者切替">
      <div class="type-switch">
        <a id="comparePitcherTypeLink" class="type-switch-link" href="./player.html?type=pitcher">投手</a>
        <a id="compareBatterTypeLink" class="type-switch-link" href="./player.html?type=batter">打者</a>
      </div>
    </section>

    <main class="panel annual-main">
      <section class="panel-block">
        <div class="section-head compare-head">
          <div>
            <h2 id="comparePlayerName">選手を読み込み中</h2>
            <p id="compareDescription" class="compare-subtitle compare-subtitle--muted"></p>
          </div>
          <a id="compareBackLink" class="action-link secondary compare-back-link" href="./annual.html">年度別成績へ戻る</a>
        </div>
        <div id="modeToggleGroup" class="compare-mode-group"></div>
        <div id="metricToggleGroup" class="compare-toggle-group"></div>
      </section>

      <section id="seasonPanel" class="panel-block is-hidden">
        <div class="section-head compare-head">
          <h2>年度成績</h2>
          <span id="seasonMetricCount" class="result-count">0球</span>
        </div>
        <div id="seasonDetailWrap" class="season-detail-wrap"></div>
      </section>

      <section id="comparePanel" class="panel-block">
        <div class="section-head compare-head">
          <h2>前年比較</h2>
          <span id="compareMetricCount" class="result-count">0項目</span>
        </div>
        <div id="compareSeasonGrid" class="season-meta-grid"></div>
        <div id="compareCardGrid" class="comparison-card-grid"></div>
      </section>

      <section id="monthlyPanel" class="panel-block is-hidden">
        <div class="section-head compare-head">
          <h2>月別成績</h2>
          <span id="monthlyMetricCount" class="result-count">0項目</span>
        </div>
        <div id="monthlySeasonGrid" class="season-meta-grid"></div>
        <div id="monthlyTableWrap" class="monthly-table-wrap"></div>
        <div id="monthlyChartGrid" class="monthly-chart-grid"></div>
      </section>
    </main>
  </div>

  <script defer src="./compare.js?v=20260501-4"></script>
</body>
</html>
